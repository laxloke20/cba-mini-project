name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker Image
        run: docker build -t cba-api .

      - name: Run container test
        run: |
          docker run -d -p 5000:5000 cba-api
          sleep 5
          curl http://localhost:5000/api/fast

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cba-api
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH