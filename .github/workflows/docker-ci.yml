name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Step 1: Get your code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Build Docker image
    - name: Build Docker Image
      run: docker build -t cba-api .

    # Step 3: Run container and test API
    - name: Run container test
      run: |
        docker run -d -p 5000:5000 cba-api
        sleep 5
        curl http://localhost:5000/api/fast

    # Step 4: Install Trivy (security scanning)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

    # Step 5: Scan Docker image for vulnerabilities
    - name: Scan Docker Image
      run: trivy image cba-api