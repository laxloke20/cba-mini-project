<!DOCTYPE html>
<html>
<head>
    <title>CBA Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin: 15px;
            border-radius: 15px;
            width: 200px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .fast { border-left: 5px solid #00ffcc; }
        .slow { border-left: 5px solid #ff4d4d; }
        .stats { border-left: 5px solid #ffd700; }
        .dashboard { border-left: 5px solid #4da6ff; }

        footer {
            margin-top: 50px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <h1>🚀 Container Based Application</h1>
    <p>Real-time API Simulation Dashboard</p>

    <div class="container">

        <div class="card fast">
            <h2>⚡ Fast API</h2>
            <p>Quick response endpoint</p>
            <a href="/api/fast">Test</a>
        </div>

        <div class="card slow">
            <h2>🐢 Slow API</h2>
            <p>Delayed response simulation</p>
            <a href="/api/slow">Test</a>
        </div>

        <div class="card stats">
            <h2>📊 Stats</h2>
            <p>View performance data</p>
            <a href="/api/stats">Open</a>
        </div>

        <div class="card dashboard">
            <h2>📈 Dashboard</h2>
            <p>Visual insights</p>
            <a href="/dashboard">Open</a>
        </div>

    </div>

    <footer>
        <p>Running with Docker Multi-Container Setup</p>
    </footer>

</body>
</html>
