apiVersion: apps/v1
kind: Deployment
metadata:
  name: cba-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cba-api
  template:
    metadata:
      labels:
        app: cba-api
    spec:
      containers:
        - name: cba-api
          image: cba-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: ENV
              value: "production"